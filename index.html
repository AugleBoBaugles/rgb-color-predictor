<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Red Green Blue Marker Teachable Machine App</title>
    <style>
      body {
        font-family: sans-serif;
        max-width: 600px;
        margin: 2rem auto;
        padding: 0 1rem;
        text-align: center;
        transition: background-color 0.4s ease;
        background-color: #f7f7f7;
      }
      .subtitle {
        color: #555;
        margin-top: -0.5rem;
        margin-bottom: 1.5rem;
      }
      #message {
        margin: 1rem auto;
        padding: 1rem;
        max-width: 300px;
        font-size: 1.4rem;
        font-weight: bold;
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.75);
      }
      #webcam-container {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 1rem 0;
      }
      #webcam-container canvas {
        display: none;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
      }
      #webcam-container.active canvas {
        display: block;
      }
      #label-container div {
        font-size: 1.1rem;
        padding: 0.25rem 0;
      }
      button {
        padding: 0.6rem 1.5rem;
        font-size: 1rem;
        cursor: pointer;
        border-radius: 6px;
        border: none;
        color: white;
        background: #2563eb;
        margin: 1rem 0;
      }
      button.stop {
        background: #dc2626;
      }
      button:hover {
        opacity: 0.9;
      }
    </style>
  </head>
  <body>
    <h1>Magic Marker</h1>
    <p class="subtitle">Hold up a red, blue, or teal marker to change the page.</p>

    <button id="toggleButton" onclick="toggleCamera()">Start Camera</button>

    <div id="webcam-container"></div>
    <div id="label-container"></div>
    <div id="message"></div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script>
      // REPLACE THIS with your model URL from Teachable Machine:
      const URL = "https://teachablemachine.withgoogle.com/models/m_CuEuQNB/";

      let model, webcam, labelContainer, maxPredictions;
      let isRunning = false;
      let backgroundCount = 0;

      async function init() {
        model = await tmImage.load(URL + "model.json", URL + "metadata.json");
        maxPredictions = model.getTotalClasses();

        webcam = new tmImage.Webcam(300, 300, true);
        await webcam.setup();
        await webcam.play();

        const container = document.getElementById("webcam-container");
        container.innerHTML = "";
        container.appendChild(webcam.canvas);
        container.classList.add("active");

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) {
          labelContainer.appendChild(document.createElement("div"));
        }

        isRunning = true;
        window.requestAnimationFrame(loop);
      }

      async function loop() {
        if (!isRunning) return;
        webcam.update();
        await predict();
        window.requestAnimationFrame(loop);
      }

      async function predict() {
        const prediction = await model.predict(webcam.canvas);

        // Find the class with the highest probability
        let topClass = prediction[0];
        for (let i = 1; i < prediction.length; i++) {
          if (prediction[i].probability > topClass.probability) {
            topClass = prediction[i];
          }
        }

        // topClass.className is the winning label
        // topClass.probability is how confident the model is
        console.log(topClass.className, topClass.probability);

        // Update the display
        for (let i = 0; i < maxPredictions; i++) {
          const classPrediction =
            prediction[i].className +
            ": " +
            prediction[i].probability.toFixed(2);
          labelContainer.childNodes[i].innerHTML = classPrediction;
        }

        const messageEl = document.getElementById("message");
        if (topClass.className === "Marker Red" && topClass.probability > 0.8) {
          document.body.style.backgroundColor = "#fe5858"; // red
          backgroundCount = 0;
          messageEl.textContent = "Red Detected";
        } else if(topClass.className === "Marker Blue" && topClass.probability > 0.8) {
          messageEl.textContent = "Blue Detected";
          backgroundCount = 0;
          document.body.style.backgroundColor = "#486dff"; // blue
        } else if(topClass.className === "Marker Teal" && topClass.probability > 0.8 ) {
          backgroundCount = 0;
          messageEl.textContent = "Teal Detected";
          document.body.style.backgroundColor = "#57ffe6"; // teal
        } else if (backgroundCount > 10){
            messageEl.textContent = "???";
            document.body.style.backgroundColor = "#f7f7f7";
        } else if (topClass.className === "Background") {
            backgroundCount++;
            
        }
      }

      async function toggleCamera() {
        const button = document.getElementById("toggleButton");
        if (!isRunning) {
          await init();
          button.textContent = "Stop Camera";
          button.classList.add("stop");
        } else {
          isRunning = false;
          webcam.stop();
          document
            .getElementById("webcam-container")
            .classList.remove("active");
          button.textContent = "Start Camera";
          button.classList.remove("stop");
        }
      }
    </script>
  </body>
</html>
